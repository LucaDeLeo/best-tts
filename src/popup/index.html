<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best TTS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Best TTS</h1>
      <span id="status-indicator" class="status-indicator"></span>
    </header>

    <!-- Download Progress (shown during model download) -->
    <div id="progress-section" class="progress-section hidden">
      <div class="progress-label">
        <span>Downloading model...</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-file" class="progress-file"></p>
    </div>

    <!-- Main Controls (shown when ready) -->
    <div id="main-section" class="main-section">
      <!-- Extraction Section -->
      <div class="extraction-section">
        <div class="extraction-buttons">
          <button id="read-page-btn" class="btn secondary" title="Extract and read this page">
            Read This Page
          </button>
          <button id="read-selection-btn" class="btn secondary" title="Read selected text">
            Read Selection
          </button>
        </div>
        <div id="extraction-status" class="extraction-status hidden">
          <span id="extraction-source"></span>
          <button id="save-to-library-btn" class="btn secondary small" title="Save to library">Save</button>
          <button id="clear-extraction-btn" class="btn-icon" title="Clear">&#10005;</button>
        </div>
      </div>

      <!-- File Import Section -->
      <div class="section file-import-section">
        <div class="section-header">Import Document</div>
        <div class="file-import-row">
          <input type="file"
                 id="file-input"
                 accept=".pdf,.txt,.md"
                 class="hidden">
          <button id="import-file-btn" class="btn secondary">
            Import File
          </button>
          <span id="supported-formats" class="hint">PDF, TXT, MD</span>
        </div>

        <!-- File size warning dialog (hidden by default) -->
        <div id="file-size-warning" class="warning-dialog hidden">
          <div class="warning-content">
            <div class="warning-icon">Warning</div>
            <div class="warning-text">
              <strong>Large File</strong>
              <p id="file-size-message">This file is over 50 MB. Processing may be slow.</p>
            </div>
            <div class="warning-actions">
              <button id="file-cancel-btn" class="btn secondary small">Cancel</button>
              <button id="file-continue-btn" class="btn primary small">Continue</button>
            </div>
          </div>
        </div>

        <!-- Import progress (hidden by default) -->
        <div id="import-progress" class="import-progress hidden">
          <div class="import-progress-header">
            <span id="import-filename">filename.pdf</span>
            <button id="cancel-import-btn" class="btn-icon-only" title="Cancel import">&#10005;</button>
          </div>
          <div class="progress-bar">
            <div id="import-progress-fill" class="progress-fill"></div>
          </div>
          <span id="import-progress-text" class="progress-text">Uploading...</span>
        </div>

        <!-- Import status (shown after import) -->
        <div id="import-status" class="extraction-status hidden">
          <span id="import-source"></span>
          <button id="save-import-to-library-btn" class="btn secondary small" title="Save to library">Save</button>
          <button id="clear-import-btn" class="btn-icon-only" title="Clear import">&#10005;</button>
        </div>
      </div>

      <!-- Text Input -->
      <div class="input-group">
        <label for="text-input">Text to speak</label>
        <textarea
          id="text-input"
          placeholder="Enter text to convert to speech..."
          rows="4"
        ></textarea>
      </div>

      <!-- Voice Selection -->
      <div class="input-group">
        <label for="voice-select">Voice</label>
        <select id="voice-select">
          <option value="">Loading voices...</option>
        </select>
      </div>

      <!-- Speed Control -->
      <div class="control-row">
        <label for="speed-slider">Speed:</label>
        <input type="range" id="speed-slider" min="0.5" max="4" step="0.25" value="1">
        <span id="speed-value">1x</span>
      </div>

      <!-- Progress Indicator -->
      <div id="progress-indicator" class="progress-indicator-section hidden">
        <span id="sentence-progress">Sentence 0 of 0</span>
        <div class="sentence-bar">
          <div id="sentence-fill" class="sentence-fill"></div>
        </div>
      </div>

      <!-- Playback Controls -->
      <div class="button-row">
        <button id="skip-back-btn" class="control-btn" disabled title="Previous sentence (Left Arrow)">
          <span class="icon">&#9198;</span>
        </button>
        <button id="play-btn" class="btn btn-primary" disabled>
          <span class="btn-text">Speak</span>
          <span class="btn-loading hidden">Generating...</span>
        </button>
        <button id="pause-btn" class="btn btn-primary hidden" disabled>Pause</button>
        <button id="skip-forward-btn" class="control-btn" disabled title="Next sentence (Right Arrow)">
          <span class="icon">&#9197;</span>
        </button>
        <button id="stop-btn" class="btn btn-secondary" disabled>
          Stop
        </button>
      </div>

      <!-- Show Floating Player (visible when playback active and player may be dismissed) -->
      <button id="show-player-btn" class="btn btn-tertiary hidden" title="Restore the floating player on the page">
        Show Player
      </button>

      <div class="shortcuts-hint">
        <small>Space: Play/Pause | Arrows: Skip | +/-: Speed</small>
      </div>

      <!-- Status Messages -->
      <p id="message" class="message"></p>
    </div>

    <!-- Error State -->
    <div id="error-section" class="error-section hidden">
      <p id="error-message" class="error-message"></p>
      <button id="retry-btn" class="btn btn-secondary">Retry</button>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
