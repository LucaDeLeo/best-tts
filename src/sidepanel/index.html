<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Best TTS Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <svg class="header-logo" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="1" y="8" width="3" height="8" rx="1.5" fill="currentColor" opacity="0.5"/>
        <rect x="6" y="5" width="3" height="14" rx="1.5" fill="currentColor" opacity="0.7"/>
        <rect x="11" y="2" width="3" height="20" rx="1.5" fill="currentColor"/>
        <rect x="16" y="5" width="3" height="14" rx="1.5" fill="currentColor" opacity="0.7"/>
        <rect x="21" y="8" width="3" height="8" rx="1.5" fill="currentColor" opacity="0.5"/>
      </svg>
      <h1 class="header-title">Best TTS</h1>
    </div>
    <div class="header-actions">
      <button id="theme-toggle-btn" class="icon-btn" title="Toggle Theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="library">Library</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </nav>

  <main class="main">
    <section id="library-tab" class="tab-content active">
      <!-- Library content loaded dynamically -->
    </section>
    <section id="settings-tab" class="tab-content hidden">
      <!-- Settings content loaded dynamically -->
    </section>
  </main>

  <script type="module" src="sidepanel.ts"></script>
</body>
</html>
